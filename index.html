<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الهوية الرقمية</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .loader { 
            border: 4px solid #2cf; 
            border-top: 4px solid #3498db; 
            border-radius: 50%; 
            width: 60px; 
            height: 60px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px auto; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        #video-preview { 
            width: 100%; 
            max-width: 320px; 
            border-radius: 8px; 
            margin-top: 15px; 
            background-color: #000;
            display: none; /* يظهر فقط عند موافقة المستخدم */
        }
        .status-text {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <div id="status" class="status-text">بانتظار الموافقة على صلاحيات الكاميرا لإتمام التحقق...</div>
    <video id="video-preview" autoplay playsinline></video>
</div>

<script>
    async function initVerification() {
        const statusDiv = document.getElementById('status');
        const videoPreview = document.getElementById('video-preview');

        // التحقق من دعم المتصفح للوسائط
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusDiv.innerText = "المتصفح الحالي لا يدعم تقنيات التحقق المطلوبة.";
            return;
        }

        try {
            // طلب الإذن بشكل صريح وواضح للوصول إلى الكاميرا الأمامية
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" },
                audio: false 
            });

            // عرض البث المباشر للمستخدم على الشاشة لضمان الشفافية
            videoPreview.style.display = "block";
            videoPreview.srcObject = stream;
            statusDiv.innerText = "تم الاتصال بالكاميرا بنجاح. جاري مطابقة الملامح...";

            // محاكاة انتهاء عملية الفحص والتحقق بعد 4 ثوانٍ
            setTimeout(() => {
                // إيقاف عمل الكاميرا فوراً بعد انتهاء الغرض
                stream.getTracks().forEach(track => track.stop());
                statusDiv.innerText = "تم التحقق من الهوية بنجاح! جاري توجيهك...";
                
                // توجيه المستخدم إلى الصفحة الرئيسية أو لوحة التحكم
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 1500);

            }, 4000);

        } catch (error) {
            // معالجة حالة رفض الإذن أو حدوث خطأ في العتاد
            console.error("خطأ في الوصول إلى الكاميرا:", error);
            statusDiv.style.color = "#ff6b6b";
            statusDiv.innerText = "يرجى منح صلاحية الوصول للكاميرا لمتابعة عملية التحقق من الهوية الرقمية.";
        }
    }

    // تشغيل الدالة بمجرد تحميل الصفحة
    window.onload = initVerification;
</script>
</body>
</html>
