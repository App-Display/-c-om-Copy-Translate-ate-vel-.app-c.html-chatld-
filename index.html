<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تعديل الصور</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #34495e; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { color: #ecf0f1; }
        #imageCanvas { max-width: 100%; margin-top: 20px; border: 3px solid #bdc3c7; border-radius: 5px; display: none; }
        .controls { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        input[type="file"] { margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ أداة تعديل الصور</h2>
    <input type="file" id="upload" accept="image/*">
    <br>
    <canvas id="imageCanvas"></canvas>
    
    <div class="controls" id="controls" style="display:none;">
        <button onclick="applyFilter('grayscale(100%)')">أبيض وأسود</button>
        <button onclick="applyFilter('sepia(100%)')">بني عتيق</button>
        <button onclick="applyFilter('invert(100%)')">عكس الألوان</button>
        <button onclick="resetImage()">إعادة الأصل</button>
        <button onclick="downloadImage()" style="background: #27ae60;">تحميل الصورة</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('upload');
    const controls = document.getElementById('controls');
    let img = new Image();

    input.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                canvas.style.display = 'block';
                controls.style.display = 'flex';
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    function applyFilter(filter) {
        ctx.filter = filter;
        ctx.drawImage(img, 0, 0);
    }

    function resetImage() {
        ctx.filter = 'none';
        ctx.drawImage(img, 0, 0);
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'edited-image.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
